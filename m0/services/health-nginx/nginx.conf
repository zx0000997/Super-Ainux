worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    server {
        listen 8080;
        server_name _;
        location /health {
            default_type text/plain;
            return 200 "ok\n";
        }
        location / {
            return 404;
        }
    }
}
